<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
}

/* HEADER MAIN */
.header {
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
              url('https://images.unsplash.com/photo-1589829545856-d10d557cf95f');
  background-size: cover;
  background-position: center;
  color: white;
  text-align: center;
  padding: 40px 20px;
}

/* FIRM NAME */
.header h1 {
  font-size: 42px;
  margin: 10px 0;
  letter-spacing: 2px;
}

/* TAGLINE */
.header p {
  font-size: 18px;
  font-style: italic;
  color: #f1c40f;
}

/* EXPERTS SECTION */
.experts {
  margin-top: 30px;
  display: flex;
  justify-content: center;
  gap: 25px;
  flex-wrap: wrap;
}

.experts img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid #f1c40f;
  object-fit: cover;
  transition: 0.3s;
}

.experts img:hover {
  transform: scale(1.1);
}

.expert-name {
  margin-top: 8px;
  font-size: 14px;
}

</style>
</head>

<body>

<div class="header">

  <h1>The Esperer</h1>

  <p>"Justice. Integrity. Excellence in Legal Services."</p>

  <div class="experts">

    <div>
      <img src="https://randomuser.me/api/portraits/women/44.jpg">
      <div class="expert-name">Adv. Asha Tiwari</div>
    </div>

    <div>
      <img src="https://randomuser.me/api/portraits/men/32.jpg">
      <div class="expert-name">Legal Expert</div>
    </div>

    <div>
      <img src="https://randomuser.me/api/portraits/men/45.jpg">
      <div class="expert-name">Senior Advocate</div>
    </div>

    <div>
      <img src="https://randomuser.me/api/portraits/women/68.jpg">
      <div class="expert-name">Consultant</div>
    </div>

  </div>

</div>

</body>
</html>
