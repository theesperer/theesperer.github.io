<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f4f4;
}

/* HEADER MAIN (Width reduced more) */
.header {
  max-width: 950px; /* width aur kam */
  margin: 20px auto;
  border-radius: 12px;
  overflow: hidden;

  background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
              url('https://images.unsplash.com/photo-1589394815804-964ed0be2eb5');
  background-size: cover;
  background-position: center;
  text-align: center;
}

/* TOP CONTENT */
.top-content {
  padding-top: 10px; /* sirf thoda gap (1/2 cm approx) */
  padding-bottom: 20px;
}

/* FIRM NAME */
.top-content h1 {
  margin: 0;
  font-size: 38px;
  color: #2c3e50;
}

/* TAGLINES */
.line1 {
  font-size: 20px;
  color: #1a5276;
  font-weight: bold;
  margin-top: 10px;
}

.line2 {
  font-size: 16px;
  color: #555;
  margin-top: 5px;
}

/* BUTTON */
.btn {
  margin-top: 15px;
  padding: 10px 22px;
  background: #b7950b;
  color: white;
  border: none;
  border-radius: 25px;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #7d6608;
}

/* DIVIDER LINE */
.divider {
  width: 80%;
  height: 2px;
  background: linear-gradient(to right, transparent, #b7950b, transparent);
  margin: 15px auto;
}

/* TEAM TITLE */
.team-title {
  font-weight: bold;
  color: #2c3e50;
  margin-bottom: 10px;
}

/* EXPERTS SECTION */
.experts {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding-bottom: 0;
}

/* IMAGES TOUCH BORDER */
.experts img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 3px solid #b7950b;
  object-fit: cover;
  transition: 0.3s;
}

.experts img:hover {
  transform: scale(1.1);
}

.expert-name {
  font-size: 13px;
  margin-top: 5px;
}

/* BOTTOM ALIGN */
.team-section {
  padding-bottom: 5px;
}

</style>
</head>

<body>

<div class="header">

  <div class="top-content">

    <h1>⚖️ The Esperer</h1>

    <div class="line1">Expert Legal Solutions</div>

    <div class="line2">
      Professional, ethical & result-driven legal services
    </div>

    <button class="btn">Consult Now</button>

  </div>

  <!-- DESIGN LINE -->
  <div class="divider"></div>

  <!-- TEAM -->
  <div class="team-section">

    <div class="team-title">Our Team</div>

    <div class="experts">

      <div>
        <img src="https://randomuser.me/api/portraits/women/44.jpg">
        <div class="expert-name">Adv. Asha Tiwari</div>
      </div>

      <div>
        <img src="https://randomuser.me/api/portraits/men/32.jpg">
        <div class="expert-name">Legal Expert</div>
      </div>

      <div>
        <img src="https://randomuser.me/api/portraits/men/45.jpg">
        <div class="expert-name">Senior Advocate</div>
      </div>

      <div>
        <img src="https://randomuser.me/api/portraits/women/68.jpg">
        <div class="expert-name">Consultant</div>
      </div>

    </div>

  </div>

</div>

</body>
</html>
