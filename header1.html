<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f4f4;
}

/* COMPACT HEADER */
.header {
  max-width: 950px;
  height: 170px; /* approx 2.5 inch */
  margin: 15px auto;
  border-radius: 10px;
  overflow: hidden;

  background: linear-gradient(rgba(255,255,255,0.88), rgba(255,255,255,0.88)),
              url('https://images.unsplash.com/photo-1589394815804-964ed0be2eb5');

  background-size: cover;
  background-position: center;

  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
}

/* LEFT SIDE (TEXT) */
.left {
  width: 55%;
}

/* FIRM NAME */
.left h1 {
  margin: 0;
  font-size: 26px;
  color: #2c3e50;
}

/* TAGLINES */
.line1 {
  font-size: 14px;
  color: #1a5276;
  font-weight: bold;
}

.line2 {
  font-size: 12px;
  color: #555;
}

/* BUTTON */
.btn {
  margin-top: 6px;
  padding: 6px 14px;
  background: #b7950b;
  color: white;
  border: none;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
}

/* RIGHT SIDE TEAM */
.right {
  width: 45%;
  text-align: center;
}

/* TEAM TITLE */
.team-title {
  font-size: 12px;
  font-weight: bold;
  color: #2c3e50;
  margin-bottom: 5px;
}

/* PHOTOS ROW */
.experts {
  display: flex;
  justify-content: center;
  gap: 10px;
}

/* SMALL IMAGES */
.experts img {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  border: 2px solid #b7950b;
  object-fit: cover;
  transition: 0.3s;
}

.experts img:hover {
  transform: scale(1.1);
}

</style>
</head>

<body>

<div class="header">

  <!-- LEFT -->
  <div class="left">
    <h1>⚖️ The Esperer</h1>
    <div class="line1">Expert Legal Solutions</div>
    <div class="line2">
      Professional, ethical & result-driven legal services
    </div>

    <button class="btn">Consult Now</button>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="team-title">Our Team</div>

    <div class="experts">
      <img src="https://randomuser.me/api/portraits/women/44.jpg">
      <img src="https://randomuser.me/api/portraits/men/32.jpg">
      <img src="https://randomuser.me/api/portraits/men/45.jpg">
      <img src="https://randomuser.me/api/portraits/women/68.jpg">
    </div>
  </div>

</div>

</body>
</html>
