<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Esperer Header</title>

<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f4f4;
}

/* HEADER */
.header {
  max-width: 950px;
  margin: 15px auto;
  border-radius: 10px;
  overflow: hidden;

  background: linear-gradient(rgba(255,255,255,0.80), rgba(255,255,255,0.80)),
            url('https://images.unsplash.com/photo-1589394815804-964ed0be2eb5');

  background-size: cover;
  background-position: center;
  padding: 12px;
}

/* ROW */
.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* SIDE PHOTOS */
.side {
  width: 20%;
  display: flex;
  justify-content: space-around;
}

.side img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 2px solid #b7950b;
  object-fit: cover;
}

/* CENTER */
.center {
  width: 60%;
  text-align: center;
}

/* LINE 1 (BLUE BACKGROUND) */
.line1 {
  font-size: 42px;
  font-weight: bold;
  color: white;

  background: #1a5276; /* Blue background */
  padding: 5px 0;
  border-radius: 6px;

  letter-spacing: 6px;
  word-spacing: 25px;
}

/* LINE 2 (DARK BLUE) */
.line2 {
  font-size: 21px;
  color: #0b3c5d; /* dark blue */

  margin-top: 5px;

  letter-spacing: 2px;
  word-spacing: 10px;
}

/* LINE 3 (DARK RED BOLD) */
.line3 {
  font-size: 11px;
  font-weight: bold;
  color: #8b0000; /* dark red */

  margin-top: 3px;
}

/* NAV */
.nav {
  margin-top: 12px;
  display: flex;
  gap: 8px;
}

/* BUTTON STYLE (LIGHT & CLEAN) */
.nav a {
  flex: 1;
  text-align: center;

  text-decoration: none;
  font-size: 15px;
  font-weight: bold;

  padding: 10px 0;

  color: #2c3e50;
  background: #d6eaf8; /* light blue */

  border-radius: 8px;
  border: 1px solid #aed6f1;

  transition: 0.3s;
}

/* HOVER */
.nav a:hover {
  background: #5dade2;
  color: white;
}

</style>
</head>

<body>

<div class="header">

  <div class="row">

    <!-- LEFT -->
    <div class="side">
      <img src="https://randomuser.me/api/portraits/women/44.jpg">
      <img src="https://randomuser.me/api/portraits/men/32.jpg">
    </div>

    <!-- CENTER -->
    <div class="center">

      <div class="line1">⚖️ The Esperer ⚖️</div>

      <div class="line2">Expert Legal Solutions</div>

      <div class="line3">
        (Professional, ethical & result-driven legal services)
      </div>

    </div>

    <!-- RIGHT -->
    <div class="side">
      <img src="https://randomuser.me/api/portraits/men/45.jpg">
      <img src="https://randomuser.me/api/portraits/women/68.jpg">
    </div>

  </div>

  <!-- NAVIGATION -->
  <div class="nav">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Achievements</a>
    <a href="#">Contact</a>
  </div>

</div>

</body>
</html>
