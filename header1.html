<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f4f4;
}

/* MAIN HEADER */
.header {
  max-width: 950px;
  margin: 15px auto;
  border-radius: 10px;
  overflow: hidden;

  background: linear-gradient(rgba(255,255,255,0.88), rgba(255,255,255,0.88)),
              url('https://images.unsplash.com/photo-1589394815804-964ed0be2eb5');

  background-size: cover;
  background-position: center;
  padding: 10px 15px;
}

/* FLEX ROW */
.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* SIDE PHOTOS */
.side {
  width: 20%;
  display: flex;
  justify-content: space-around;
}

.side img {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  border: 2px solid #b7950b;
  object-fit: cover;
}

/* CENTER TEXT */
.center {
  width: 60%;
  text-align: center;
}

/* LINE 1 - FIRM NAME */
.line1 {
  font-size: 28px;
  font-weight: bold;
  color: #2c3e50;
  margin: 0 40px; /* approx 1.5 inch feel */
}

/* LINE 2 */
.line2 {
  font-size: 14px;
  color: #1a5276;
  margin: 0 25px; /* approx 1 inch */
}

/* LINE 3 */
.line3 {
  font-size: 11px;
  font-weight: bold;
  color: #b03a2e;
  margin-top: 3px;
}

/* NAVBAR */
.nav {
  margin-top: 10px;
  text-align: center;
}

.nav a {
  text-decoration: none;
  margin: 0 10px;
  font-size: 13px;
  color: #2c3e50;
  font-weight: bold;
  padding: 5px 10px;
  border-radius: 15px;
  transition: 0.3s;
}

.nav a:hover {
  background: #b7950b;
  color: white;
}

</style>
</head>

<body>

<div class="header">

  <div class="row">

    <!-- LEFT PHOTOS -->
    <div class="side">
      <img src="https://randomuser.me/api/portraits/women/44.jpg">
      <img src="https://randomuser.me/api/portraits/men/32.jpg">
    </div>

    <!-- CENTER TEXT -->
    <div class="center">

      <div class="line1">⚖️ The Esperer ⚖️</div>

      <div class="line2">Expert Legal Solutions</div>

      <div class="line3">
        (Professional, ethical & result-driven legal services)
      </div>

    </div>

    <!-- RIGHT PHOTOS -->
    <div class="side">
      <img src="https://randomuser.me/api/portraits/men/45.jpg">
      <img src="https://randomuser.me/api/portraits/women/68.jpg">
    </div>

  </div>

  <!-- NAVIGATION -->
  <div class="nav">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Achievements</a>
    <a href="#">Contact</a>
  </div>

</div>

</body>
</html>
