<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Esperer Header</title>

<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f4f4;
}

/* HEADER */
.header {
  max-width: 950px;
  margin: 15px auto;
  border-radius: 10px;
  overflow: hidden;

  background: linear-gradient(rgba(255,255,255,0.88), rgba(255,255,255,0.88)),
              url('https://images.unsplash.com/photo-1589394815804-964ed0be2eb5');

  background-size: cover;
  background-position: center;
  padding: 12px;
}

/* MAIN ROW */
.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* SIDE PHOTOS */
.side {
  width: 20%;
  display: flex;
  justify-content: space-around;
}

.side img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 2px solid #b7950b;
  object-fit: cover;
}

/* CENTER TEXT */
.center {
  width: 60%;
  text-align: center;
}

/* LINE 1 */
.line1 {
  font-size: 42px; /* 1.5x */
  font-weight: bold;
  color: #1b2631;

  letter-spacing: 6px;
  word-spacing: 25px;

  width: 100%;
}

/* LINE 2 */
.line2 {
  font-size: 21px;
  color: #1a5276;

  letter-spacing: 2px;
  word-spacing: 10px;

  width: 100%;
}

/* LINE 3 */
.line3 {
  font-size: 11px;
  font-weight: bold;
  color: #b03a2e;

  margin-top: 3px;
}

/* NAV BAR */
.nav {
  margin-top: 12px;
  display: flex;
  gap: 8px;
}

/* BUTTON STYLE */
.nav a {
  flex: 1;
  text-align: center;

  text-decoration: none;
  font-size: 16px;
  font-weight: bold;

  padding: 10px 0;

  color: white;
  background: linear-gradient(135deg, #1a5276, #2c3e50);

  border-radius: 8px;
  transition: 0.3s;
}

.nav a:hover {
  background: linear-gradient(135deg, #b7950b, #7d6608);
}

</style>
</head>

<body>

<div class="header">

  <div class="row">

    <!-- LEFT PHOTOS -->
    <div class="side">
      <img src="https://randomuser.me/api/portraits/women/44.jpg">
      <img src="https://randomuser.me/api/portraits/men/32.jpg">
    </div>

    <!-- CENTER TEXT -->
    <div class="center">

      <div class="line1">⚖️ The Esperer ⚖️</div>

      <div class="line2">Expert Legal Solutions</div>

      <div class="line3">
        (Professional, ethical & result-driven legal services)
      </div>

    </div>

    <!-- RIGHT PHOTOS -->
    <div class="side">
      <img src="https://randomuser.me/api/portraits/men/45.jpg">
      <img src="https://randomuser.me/api/portraits/women/68.jpg">
    </div>

  </div>

  <!-- NAVIGATION -->
  <div class="nav">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Achievements</a>
    <a href="#">Contact</a>
  </div>

</div>

</body>
</html>
